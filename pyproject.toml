[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "mlruns", "models"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "(mlruns|models)/"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
