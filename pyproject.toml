[tool.ruff]
line-length = 100
target-version = "py312"
# notebooks/ intentionally does sys.path.insert() before importing src.* in the
# same cell (there's no other way to make the repo importable from notebooks/),
# which trips E402 — a script-lint rule that doesn't fit notebook conventions.
exclude = [".venv", "mlruns", "models", "notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "(mlruns|models)/"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
