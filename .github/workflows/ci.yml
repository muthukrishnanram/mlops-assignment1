name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Download dataset
        run: python data/download_data.py
      - name: Preprocess data
        run: python src/data/preprocess.py
      - name: Run EDA
        run: python src/eda.py
      - name: Train (fast smoke-test grid, not the full tuned run)
        run: python src/models/train.py --fast

      - name: Execute notebooks (smoke test — catches breakage, not published)
        run: |
          jupyter nbconvert --to notebook --execute --output /tmp/eda_out.ipynb notebooks/01_eda.ipynb
          jupyter nbconvert --to notebook --execute --output /tmp/training_out.ipynb notebooks/02_training.ipynb

      - name: Run unit tests
        run: >
          pytest -q --cov=src --cov=api --cov-report=term-missing
          --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload EDA figures
        uses: actions/upload-artifact@v4
        with:
          name: eda-figures
          path: report/figures/

      - name: Upload trained model (fast run, for the docker job)
        uses: actions/upload-artifact@v4
        with:
          name: final-model
          path: models/final_model/

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: final-model
          path: models/final_model/

      - name: Build image
        run: docker build -t heart-disease-api:ci .

      - name: Run container
        run: docker run -d --name ci-api -p 8000:8000 heart-disease-api:ci

      - name: Wait for health check
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy in time" >&2
          docker logs ci-api
          exit 1

      - name: Smoke-test /predict
        run: |
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d @sample_input.json | tee predict_response.json
          grep -q '"prediction"' predict_response.json

      - name: Dump container logs on failure
        if: failure()
        run: docker logs ci-api

      - name: Stop container
        if: always()
        run: docker rm -f ci-api || true
